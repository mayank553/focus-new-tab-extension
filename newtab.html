<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Full-screen wallpaper (default set via CSS; overridden by JS if custom) -->
  <div id="wallpaper"></div>

  <!-- Row 1: Greeting -->
  <header class="greeting-bar">
    <p id="greeting"></p>
  </header>

  <!-- Row 2: Clock + Daily Focus -->
  <main class="center">
    <div id="clock" class="glass">
      <div id="clock-time"></div>
      <div id="clock-date"></div>
    </div>

    <div id="focus-card" class="glass">
      <!-- Shown when today's focus is already set -->
      <div id="focus-display" class="hidden">
        <span class="label">Today's Focus</span>
        <p id="focus-text"></p>
        <div class="focus-actions">
          <button id="focus-edit-btn" class="focus-action-btn" title="Edit focus">✏️</button>
          <button id="focus-delete-btn" class="focus-action-btn" title="Clear focus">×</button>
        </div>
      </div>
      <!-- Shown when no focus set yet -->
      <div id="focus-prompt">
        <label for="focus-input">What is your main focus today?</label>
        <input id="focus-input" type="text" placeholder="Type and press Enter…" maxlength="100" autocomplete="off" />
      </div>
    </div>
  </main>

  <!-- Row 3: Tasks (left) + Controls (right) -->
  <div class="bottom-row">

    <!-- Bottom Left: Task List (Phase 3 wires up logic) -->
    <section id="tasks-panel" class="glass">
      <h2 class="panel-title">Tasks</h2>
      <div class="task-input-row">
        <input id="task-input" type="text" placeholder="Add a task…" maxlength="120" autocomplete="off" />
      </div>
      <ul id="task-list"></ul>
    </section>

    <!-- Bottom Right: Streak + Focus Mode Toggle + Settings -->
    <aside class="controls-panel">
      <!-- Streak badge (Phase 6 unhides and populates) -->
      <div id="streak-display" class="hidden"></div>

      <!-- Focus Mode Toggle (Phase 4 wires up logic) -->
      <label class="toggle-label" title="Toggle Focus Mode">
        <span class="label">Focus Mode</span>
        <div class="toggle-switch">
          <input id="focus-mode-toggle" type="checkbox" />
          <span class="slider"></span>
        </div>
      </label>

      <!-- Settings icon -->
      <a href="settings.html" id="settings-link" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </aside>

  </div>

  <!-- Reflection Modal overlay (Phase 6 triggers and wires up) -->
  <div id="reflection-overlay" class="overlay">
    <div id="reflection-modal" class="glass">
      <h2>What did you accomplish today?</h2>
      <textarea id="reflection-input" placeholder="Write about your wins today…" rows="4"></textarea>
      <div class="reflection-buttons">
        <button id="reflection-skip" class="btn-secondary">Skip</button>
        <button id="reflection-save">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
