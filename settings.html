<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — FocusTab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      padding: 2rem 2.5rem;
      overflow-y: auto;
    }

    #wallpaper {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url('assets/default-wallpaper.svg');
      background-size: cover;
      background-position: center;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 1.5rem;
    }

    /* ── Header ── */
    .settings-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-link {
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      font-size: 1.3rem;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .back-link:hover { color: #fff; }

    h1 {
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* ── Sections ── */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 520px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.5;
      margin-bottom: 1rem;
    }

    /* ── Inputs ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      padding: 0.55rem 0.85rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus { border-color: rgba(255, 255, 255, 0.5); }
    input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.28); }

    /* ── Buttons ── */
    .row {
      display: flex;
      gap: 0.65rem;
      align-items: center;
    }

    button {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: rgba(255, 255, 255, 0.92);
      color: #1a1a2e;
      font-weight: 600;
    }

    .btn-primary:hover { background: #fff; }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .btn-secondary:hover { background: rgba(255, 255, 255, 0.18); }

    .confirm-msg {
      font-size: 0.78rem;
      opacity: 0.55;
      margin-top: 0.25rem;
      min-height: 1em;
    }

    /* ── Wallpaper ── */
    .file-label {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .file-label:hover { background: rgba(255, 255, 255, 0.18); }

    input[type="file"] { display: none; }

    #wallpaper-name {
      font-size: 0.8rem;
      opacity: 0.45;
      margin-top: 0.4rem;
    }

    /* ── Block list ── */
    #blocked-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
    }

    .blocked-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      font-size: 0.875rem;
    }

    .remove-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 0.2rem;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .remove-btn:hover { color: rgba(255, 255, 255, 0.85); }

    /* ── Reflection history ── */
    #history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .history-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
    }

    .history-date {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.4;
      margin-bottom: 0.3rem;
    }

    .history-win {
      font-size: 0.875rem;
      opacity: 0.85;
      line-height: 1.45;
    }

    .empty-msg {
      font-size: 0.85rem;
      opacity: 0.38;
      font-style: italic;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="wallpaper"></div>

  <div class="settings-header">
    <a href="newtab.html" class="back-link" title="Back to dashboard">&#8592;</a>
    <h1>Settings</h1>
  </div>

  <div class="sections">

    <!-- Name -->
    <div class="glass">
      <p class="section-title">Your Name</p>
      <div class="field">
        <div class="row">
          <input id="name-input" type="text" placeholder="Enter your name…" maxlength="50" autocomplete="off" />
          <button id="name-save" class="btn-primary">Save</button>
        </div>
        <p id="name-confirm" class="confirm-msg"></p>
      </div>
    </div>

    <!-- Wallpaper -->
    <div class="glass">
      <p class="section-title">Wallpaper</p>
      <label class="file-label" for="wallpaper-input">Choose Image…</label>
      <input id="wallpaper-input" type="file" accept="image/*" />
      <p id="wallpaper-name"></p>
      <p id="wallpaper-confirm" class="confirm-msg"></p>
    </div>

    <!-- Block List -->
    <div class="glass">
      <p class="section-title">Blocked Sites</p>
      <ul id="blocked-list"></ul>
      <div class="row">
        <input id="domain-input" type="text" placeholder="example.com" maxlength="100" autocomplete="off" />
        <button id="domain-add" class="btn-primary">Add</button>
      </div>
      <p id="domain-error" class="confirm-msg"></p>
    </div>

    <!-- Reflection History (P6-9) -->
    <div class="glass" id="history-section">
      <p class="section-title">Reflection History</p>
      <ul id="history-list"></ul>
    </div>

  </div>

  <script src="settings.js"></script>
</body>
</html>
