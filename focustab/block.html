<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stay Focused — FocusTab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 480px;
      width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .icon { font-size: 2.5rem; }

    h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .focus-line {
      font-size: 0.85rem;
      opacity: 0.6;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #focus-text {
      font-size: 1.05rem;
      font-weight: 400;
      opacity: 0.9;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-top: 0.5rem;
    }

    button {
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      border: none;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    #btn-back {
      background: rgba(255, 255, 255, 0.92);
      color: #1a1a2e;
      font-weight: 600;
    }

    #btn-back:hover { background: #fff; }

    #btn-disable {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    #btn-disable:hover { background: rgba(255, 255, 255, 0.15); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎯</div>
    <h1>Stay Focused</h1>
    <div>
      <p class="focus-line">Your main focus today</p>
      <p id="focus-text">Stay on track</p>
    </div>
    <div class="buttons">
      <button id="btn-back">Go Back</button>
      <button id="btn-disable">Disable Focus Mode</button>
    </div>
  </div>
  <script src="block.js"></script>
</body>
</html>
